<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Class - Parent Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin: 3rem auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 20px var(--primary-glow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* File Upload Area */
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(139, 92, 246, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
        }

        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        /* Dashboard Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0.7;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Spellbook List */
        .spellbook-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .spellbook-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .spell-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .spell-list::-webkit-scrollbar {
            width: 6px;
        }
        .spell-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .spell-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .spell-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--secondary);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .spell-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .spell-word {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .spell-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .mastery-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #dashboard-view {
            display: none;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Communication Class</h1>
        <p>Parent & Educator Dashboard</p>
    </header>

    <main class="container">
        
        <!-- Upload Section -->
        <div class="card" id="upload-section">
            <div class="upload-area">
                <input type="file" id="file-input" accept=".json" />
                <div class="upload-icon">📁</div>
                <h2>Drop save.json here</h2>
                <p style="color: var(--text-muted);">or click to browse your files</p>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Student Class</div>
                    <div class="stat-value" id="val-class" style="font-size: 1.8rem; margin-top: 10px;">Scholar</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total XP</div>
                    <div class="stat-value" id="val-xp">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Words Encountered</div>
                    <div class="stat-value" id="val-words">0</div>
                </div>
            </div>

            <div class="card">
                <div class="spellbook-header">
                    <h3>Vocabulary Mastery</h3>
                    <span style="color: var(--text-muted); font-size: 0.9rem;">(Latest learning progress)</span>
                </div>
                <ul class="spell-list" id="spell-list">
                    <!-- Javascript will inject list items here -->
                </ul>
            </div>

        </div>

    </main>

    <script>
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Hide upload, show dashboard
                    document.getElementById('upload-section').style.display = 'none';
                    document.getElementById('dashboard-view').style.display = 'block';
                    
                    // Populate stats
                    document.getElementById('val-class').textContent = data.character_sheet?.emergent_class || "Novice";
                    
                    // Animate numbers
                    animateValue("val-xp", 0, data.character_sheet?.total_xp || 0, 1000);
                    animateValue("val-words", 0, data.character_sheet?.words_encountered || 0, 1000);
                    
                    // Populate list
                    const ul = document.getElementById('spell-list');
                    ul.innerHTML = '';
                    
                    if (data.spellbook && data.spellbook.entries && data.spellbook.entries.length > 0) {
                        data.spellbook.entries.forEach((entry, index) => {
                            const li = document.createElement('li');
                            li.className = 'spell-item';
                            // Staggered animation
                            li.style.animation = `fadeIn 0.5s ease forwards ${index * 0.05}s`;
                            li.style.opacity = '0';
                            
                            li.innerHTML = `
                                <div class="spell-word">${entry.word}</div>
                                <div class="spell-meta">
                                    <span>Channel: ${entry.channel || 'Standard'}</span>
                                    <span class="mastery-badge">Mastery ${entry.mastery || 0}%</span>
                                </div>
                            `;
                            ul.appendChild(li);
                        });
                    } else {
                        ul.innerHTML = '<li style="text-align:center; padding: 2rem; color: #94a3b8;">No words mastered yet. Play the game to start learning!</li>';
                    }
                } catch(err) {
                    console.error(err);
                    alert("Error: Invalid save.json format. Please ensure you are uploading the correct file.");
                }
            };
            reader.readAsText(file);
        });

        // Helper function to animate numbers counting up
        function animateValue(id, start, end, duration) {
            if (start === end) {
                document.getElementById(id).innerHTML = end;
                return;
            }
            let range = end - start;
            let current = start;
            let increment = end > start ? 1 : -1;
            let stepTime = Math.abs(Math.floor(duration / range));
            let obj = document.getElementById(id);
            let timer = setInterval(function() {
                current += increment;
                obj.innerHTML = current;
                if (current == end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }
    </script>
</body>
</html>
